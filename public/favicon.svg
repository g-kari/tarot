<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background circle -->
  <circle cx="64" cy="64" r="62" fill="#0a0d18"/>
  <circle cx="64" cy="64" r="60" fill="none" stroke="#a89060" stroke-width="1.5" opacity="0.6"/>

  <!-- Tarot card shape -->
  <rect x="38" y="20" width="52" height="88" rx="5" fill="#0f1224" stroke="#a89060" stroke-width="1.2" opacity="0.9"/>

  <!-- Inner card border -->
  <rect x="42" y="24" width="44" height="80" rx="3" fill="none" stroke="#6366f1" stroke-width="0.6" opacity="0.35"/>

  <!-- Star / mystic symbol (six-pointed star) -->
  <g transform="translate(64,58)" opacity="0.85">
    <!-- Upward triangle -->
    <polygon points="0,-18 15.6,9 -15.6,9" fill="none" stroke="#a89060" stroke-width="1.4"/>
    <!-- Downward triangle -->
    <polygon points="0,18 15.6,-9 -15.6,-9" fill="none" stroke="#6366f1" stroke-width="1.4"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="2.5" fill="#a89060" opacity="0.8"/>
  </g>

  <!-- Small decorative dots at card corners -->
  <circle cx="47" cy="29" r="1.5" fill="#a89060" opacity="0.5"/>
  <circle cx="81" cy="29" r="1.5" fill="#a89060" opacity="0.5"/>
  <circle cx="47" cy="99" r="1.5" fill="#a89060" opacity="0.5"/>
  <circle cx="81" cy="99" r="1.5" fill="#a89060" opacity="0.5"/>

  <!-- Subtle glow behind star -->
  <radialGradient id="glow" cx="50%" cy="45%" r="30%">
    <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="transparent"/>
  </radialGradient>
  <rect x="38" y="20" width="52" height="88" rx="5" fill="url(#glow)"/>
</svg>
