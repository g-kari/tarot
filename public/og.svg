<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0d18"/>
  <radialGradient id="bg" cx="50%" cy="45%" r="65%">
    <stop offset="0%" stop-color="#141830"/>
    <stop offset="100%" stop-color="#0a0d18"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Vignette -->
  <radialGradient id="vig" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(0,0,2,0.5)"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#vig)"/>

  <!-- Three tarot cards -->
  <!-- Left card (tilted) -->
  <g transform="translate(360,315) rotate(-12)">
    <rect x="-60" y="-105" width="120" height="210" rx="8" fill="#0f1224" stroke="#a89060" stroke-width="1.5"/>
    <rect x="-52" y="-97" width="104" height="194" rx="5" fill="none" stroke="#6366f1" stroke-width="0.6" opacity="0.3"/>
    <polygon points="0,-40 12,6 -12,6" fill="none" stroke="#a89060" stroke-width="1.2" opacity="0.7"/>
    <polygon points="0,40 12,-6 -12,-6" fill="none" stroke="#6366f1" stroke-width="1.2" opacity="0.7"/>
    <circle cx="0" cy="0" r="3" fill="#a89060" opacity="0.6"/>
  </g>

  <!-- Center card -->
  <g transform="translate(500,300)">
    <rect x="-65" y="-113" width="130" height="226" rx="8" fill="#0f1224" stroke="#c8a84b" stroke-width="2"/>
    <rect x="-56" y="-104" width="112" height="208" rx="5" fill="none" stroke="#6366f1" stroke-width="0.8" opacity="0.35"/>
    <!-- Star symbol -->
    <polygon points="0,-50 17.3,10 -17.3,10" fill="none" stroke="#c8a84b" stroke-width="1.5"/>
    <polygon points="0,50 17.3,-10 -17.3,-10" fill="none" stroke="#6366f1" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="4" fill="#c8a84b" opacity="0.8"/>
    <!-- Corner dots -->
    <circle cx="-47" cy="-95" r="2" fill="#c8a84b" opacity="0.4"/>
    <circle cx="47" cy="-95" r="2" fill="#c8a84b" opacity="0.4"/>
    <circle cx="-47" cy="95" r="2" fill="#c8a84b" opacity="0.4"/>
    <circle cx="47" cy="95" r="2" fill="#c8a84b" opacity="0.4"/>
    <!-- Glow -->
    <radialGradient id="cardGlow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <rect x="-65" y="-113" width="130" height="226" rx="8" fill="url(#cardGlow)"/>
  </g>

  <!-- Right card (tilted) -->
  <g transform="translate(640,315) rotate(12)">
    <rect x="-60" y="-105" width="120" height="210" rx="8" fill="#0f1224" stroke="#a89060" stroke-width="1.5"/>
    <rect x="-52" y="-97" width="104" height="194" rx="5" fill="none" stroke="#6366f1" stroke-width="0.6" opacity="0.3"/>
    <polygon points="0,-40 12,6 -12,6" fill="none" stroke="#a89060" stroke-width="1.2" opacity="0.7"/>
    <polygon points="0,40 12,-6 -12,-6" fill="none" stroke="#6366f1" stroke-width="1.2" opacity="0.7"/>
    <circle cx="0" cy="0" r="3" fill="#a89060" opacity="0.6"/>
  </g>

  <!-- Title -->
  <text x="880" y="280" font-family="serif" font-size="72" fill="#a89060" letter-spacing="12" text-anchor="middle" opacity="0.9">TAROT</text>

  <!-- Subtitle -->
  <text x="880" y="330" font-family="serif" font-size="20" fill="#6366f1" letter-spacing="6" text-anchor="middle" opacity="0.6">INTERACTIVE READING</text>

  <!-- Decorative line -->
  <line x1="780" y1="355" x2="980" y2="355" stroke="#a89060" stroke-width="0.5" opacity="0.3"/>

  <!-- Small particles -->
  <circle cx="200" cy="150" r="1.5" fill="#a89060" opacity="0.3"/>
  <circle cx="1000" cy="100" r="1" fill="#6366f1" opacity="0.25"/>
  <circle cx="150" cy="480" r="1" fill="#6366f1" opacity="0.2"/>
  <circle cx="1050" cy="500" r="1.5" fill="#a89060" opacity="0.25"/>
  <circle cx="300" cy="80" r="1" fill="#a89060" opacity="0.2"/>
  <circle cx="900" cy="550" r="1" fill="#6366f1" opacity="0.2"/>
</svg>
