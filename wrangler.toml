name = "tarot"
compatibility_date = "2026-03-02"
compatibility_flags = ["nodejs_compat"]

main = "worker/index.ts"

[assets]
binding = "ASSETS"
directory = "dist/client"

[ai]
binding = "AI"

[[ratelimits]]
name = "AI_RATE_LIMITER"
namespace_id = "1001"

  [ratelimits.simple]
  limit = 1
  period = 60

[observability]
enabled = true
